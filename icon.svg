<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="mt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- 山 -->
  <polygon points="256,108 52,404 460,404" fill="url(#mt)"/>
  <!-- 雪キャップ -->
  <polygon points="256,108 192,218 320,218" fill="white" opacity="0.92"/>
  <!-- 旗ポール -->
  <line x1="256" y1="108" x2="256" y2="48" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- 旗（ゴールド）-->
  <polygon points="256,48 372,86 256,124" fill="#f59e0b" filter="url(#glow)"/>
</svg>
